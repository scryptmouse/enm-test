name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  ci-data:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          supported-ruby-platforms: |
            exclude: ["x64-mingw32"]
          stable-ruby-versions: |
            exclude: ["3.2", "3.3", "3.4", "head"]

  cross-gem:
    name: Compile native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs:
      - release-please
      - ci-data
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      id-token: write
      contents: write
    strategy:
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          # Let cross-gem resolve/build dependencies in its own environment.
          # Host-side bundler cache can leak incompatible native extensions.
          bundler-cache: false

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v6
        with:
          name: cross-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}

  release:
    name: Release gems to RubyGems.org
    runs-on: ubuntu-latest
    needs:
      - release-please
      - cross-gem
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby

      - uses: actions/download-artifact@v6
        with:
          path: pkg
          pattern: cross-gem-*
          merge-multiple: true

      - name: Release source gem with trusted publishing
        uses: rubygems/release-gem@v1

      - name: Push cross-platform gems
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-please.outputs.version }}"
          shopt -s nullglob
          gems=(pkg/*-"${version}"-*.gem)

          if [[ ${#gems[@]} -eq 0 ]]; then
            echo "No cross-platform gems found to push"
            exit 1
          fi

          for gem_file in "${gems[@]}"; do
            echo "Pushing ${gem_file}"
            gem push "${gem_file}"
          done
